<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog | theKitchen</title>
  <meta
    name="description"
    content="Longer notes and occasional essays published on theKitchen."
  >
  <link rel="canonical" href="https://kyumcu.github.io/theKitchen/blog/">
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
  <link rel="stylesheet" href="../assets/site.css">
  <meta property="og:title" content="Blog | theKitchen">
  <meta
    property="og:description"
    content="Longer notes and occasional essays published on theKitchen."
  >
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://kyumcu.github.io/theKitchen/blog/">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Blog | theKitchen">
  <meta
    name="twitter:description"
    content="Longer notes and occasional essays published on theKitchen."
  >
  <style>
    :root {
      --bg: #f3f6fb;
      --paper: rgba(255, 255, 255, 0.92);
      --text: #0f172a;
      --muted: #475569;
      --line: rgba(15, 23, 42, 0.14);
      --focus-ring: rgba(37, 99, 235, 0.72);
      --accent: #2563eb;
      --accent-soft: rgba(37, 99, 235, 0.12);
      --max: 860px;
    }

    body {
      font-family: Georgia, "Times New Roman", serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.12), transparent 30%),
        radial-gradient(circle at top right, rgba(99, 102, 241, 0.12), transparent 26%),
        linear-gradient(180deg, var(--bg), #eef2ff);
    }

    .wrap {
      padding: 32px 0 72px;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 40px;
    }

    .top a {
      text-decoration: none;
      color: var(--muted);
    }

    .top-links {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
      justify-content: flex-end;
    }

    .hero {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 40px 28px;
      box-shadow: 0 18px 50px rgba(25, 32, 43, 0.06);
    }

    .eyebrow {
      margin: 0 0 8px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--accent);
      font-size: 0.8rem;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.3rem, 6vw, 4.2rem);
      letter-spacing: -0.05em;
    }

    .hero p {
      margin: 16px 0 0;
      max-width: 38rem;
      color: var(--muted);
      line-height: 1.7;
      font-size: 1.05rem;
    }

    .placeholder {
      margin-top: 24px;
      border: 1px dashed var(--line);
      border-radius: 20px;
      background: var(--accent-soft);
      padding: 22px;
    }

    .placeholder h2 {
      margin: 0 0 10px;
      font-size: 1.15rem;
    }

    .placeholder p {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
    }

    @media (max-width: 640px) {
      .top {
        flex-direction: column;
        align-items: flex-start;
      }

      .top-links {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#content">Skip to content</a>

  <div class="wrap container">
    <header class="top">
      <a href="../">← Home</a>
      <nav class="top-links" aria-label="Secondary">
        <a href="../reports/">Reports</a>
        <a href="./" aria-current="page">Blog</a>
      </nav>
    </header>

    <main id="content" class="hero">
      <p class="eyebrow">Writing</p>
      <h1>Blog</h1>
      <p>Longer notes and occasional essays live here.</p>

      <section class="placeholder">
        <h2>No posts yet</h2>
        <p>
          When something ships, this page becomes a list of links. Until then, it’s a
          quiet corner with a stable URL.
        </p>
      </section>
    </main>
  </div>
</body>
</html>
