<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>theKitchen - Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            width: 100%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 12px;
            padding: 60px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        
        h1 {
            font-size: 3em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #10b981 0%, #06b6d4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            font-size: 1.1em;
            color: #94a3b8;
            margin-bottom: 40px;
        }
        
        .nav-section {
            margin: 40px 0;
        }
        
        .nav-section h2 {
            font-size: 1.3em;
            color: #10b981;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        a {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 20px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 8px;
            color: #10b981;
            text-decoration: none;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        
        a:hover {
            background: rgba(16, 185, 129, 0.2);
            border-color: rgba(16, 185, 129, 0.6);
            transform: translateX(5px);
        }
        
        a.dead-link {
            opacity: 0.6;
            cursor: not-allowed;
            background: rgba(100, 116, 139, 0.1);
            border-color: rgba(100, 116, 139, 0.3);
            color: #64748b;
        }
        
        a.dead-link:hover {
            background: rgba(100, 116, 139, 0.1);
            border-color: rgba(100, 116, 139, 0.3);
            transform: none;
        }
        
        .coming-soon {
            font-size: 0.85em;
            color: #94a3b8;
            margin-left: auto;
        }
        
        .icon {
            font-size: 1.2em;
        }
        
        .divider {
            height: 1px;
            background: rgba(148, 163, 184, 0.2);
            margin: 40px 0;
        }
        
        .footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid rgba(148, 163, 184, 0.2);
            font-size: 0.9em;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>theKitchen</h1>
        <p class="subtitle">Acts Worth Remembering</p>
        
        <div class="nav-section">
            <h2><span class="icon">👤</span>Profile</h2>
            <div class="nav-links">
                <a href="#cv">
                    <span class="icon">📄</span>
                    <span>Curriculum Vitae</span>
                </a>
            </div>
        </div>
        
        <div class="nav-section">
            <h2><span class="icon">📚</span>Archive</h2>
            <div class="nav-links">
                <a href="./reports/">
                    <span class="icon">📋</span>
                    <span>Reports & Guides</span>
                </a>
            </div>
        </div>
        
        <div class="nav-section">
            <h2><span class="icon">✍️</span>Blog</h2>
            <div class="nav-links">
                <a href="#blog" class="dead-link">
                    <span class="icon">📝</span>
                    <span>Blog Posts</span>
                    <span class="coming-soon">Coming Soon</span>
                </a>
            </div>
        </div>
        
        <div class="footer">
            <p>© 2026 theKitchen. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
